server:
  port: 8085

spring:
  threads:
    virtual:
      enabled: true
  datasource:
    hikari:
      idle-timeout: 30000
      max-lifetime: 180000
      connection-timeout: 5000
      maximum-pool-size: 50
    url: jdbc:mariadb://10.0.0.4:3306/gameinfo_key_inventory
  application:
    name: key-inventory-service
  rabbitmq:
    host: 10.0.0.4
    port: 5672
  cloud:
    config:
      name: gameinfo
  config:
    import:
      - "optional:configserver:http://config-service:9088"
  h2:
    console:
      enabled: true
      settings:
        web-allow-others: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        use_id_generator_strategy_three_lo: false
        format_sql: false
        dialect: org.hibernate.dialect.MariaDBDialect

management:
  tracing:
    sampling:
      probability: 1.0
    enabled: true
  zipkin:
    tracing:
      endpoint: http://10.0.0.4:9411/api/v2/spans
  endpoints:
    web:
      exposure:
        include:
          - health
          - beans
          - info
          - busrefresh
          - prometheus
          - metrics
logging:
  level:
    com.zaxxer.hikari: INFO
    com.zaxxer.hikari.pool.HikariPool: INFO